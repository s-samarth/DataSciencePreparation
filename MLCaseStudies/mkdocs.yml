site_name: ML System Design Case Studies
site_description: Interview-prep study notes for 20 ML and GenAI system design case studies
site_author: Samarth Saraswat
site_url: https://s-samarth.github.io/DataSciencePreparation/MLCaseStudies/
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

extra:
  generator: false

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - "← Study Hub": https://s-samarth.github.io/DataSciencePreparation/
  - Home: index.md
  - Recommendation & Personalization:
      - recommendation/index.md
      - Recommendation System: recommendation/01-recommendation-system.md
      - News Feed / Personalized Ranking: recommendation/02-news-feed-personalized-ranking.md
      - Conversational Recommender: recommendation/15-conversational-recommender.md
      - People You May Know / Graph: recommendation/16-people-you-may-know-graph-recommendation.md
      - Autocomplete / Typeahead: recommendation/18-autocomplete-typeahead-personalization.md
      - Notification Optimization / Bandit: recommendation/19-notification-optimization-bandit-system.md
  - Search, Ranking & Ads:
      - search-ads/index.md
      - Search Ranking System: search-ads/03-search-ranking-system.md
      - Ads CTR / Ranking / Experimentation: search-ads/11-ads-ctr-ranking-experimentation.md
  - LLM & GenAI Systems:
      - llm-systems/index.md
      - Enterprise AI Copilot: llm-systems/04-enterprise-ai-copilot.md
      - Production RAG / Enterprise Search: llm-systems/05-production-rag-enterprise-search.md
      - LLM Evaluation & Monitoring: llm-systems/06-llm-evaluation-monitoring-platform.md
      - AI Agent for Customer Support: llm-systems/07-ai-agent-customer-support-ticket-resolution.md
      - Multi-Tenant LLM Serving: llm-systems/08-multi-tenant-llm-serving-platform.md
      - LLM Safety Gateway: llm-systems/13-llm-safety-gateway.md
      - Document Intelligence Pipeline: llm-systems/14-document-intelligence-pipeline.md
  - Trust, Safety & Anomaly:
      - trust-safety/index.md
      - Fraud / Anomaly Detection: trust-safety/09-fraud-anomaly-detection-system.md
      - Content Moderation / Policy Enforcement: trust-safety/10-content-moderation-policy-enforcement.md
      - Spam / Bot Detection: trust-safety/17-spam-bot-detection-system.md
  - ML Platform & Ops:
      - platform-ops/index.md
      - ML Model Deployment Platform: platform-ops/12-ml-model-deployment-platform.md
      - ML Monitoring / Drift / Retraining: platform-ops/20-ml-monitoring-drift-retraining.md

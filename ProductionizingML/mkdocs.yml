site_name: Productionizing ML — Study Notes
site_description: Interview-prep study notes for production ML system design, data foundations, training, serving, the production loop, infrastructure, and a hands-on implementation masterclass.
site_author: Samarth Saraswat
site_url: https://s-samarth.github.io/DataSciencePreparation/ProductionizingML/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

extra:
  generator: false

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - "← Study Hub": https://s-samarth.github.io/DataSciencePreparation/
  - Home: index.md
  - System Design Foundations:
      - sysdesign/index.md
      - The Standard Request Path: sysdesign/request-path.md
      - The 12 Building Blocks: sysdesign/building-blocks.md
      - Latency and Capacity: sysdesign/latency-capacity.md
      - Worked Case Studies: sysdesign/case-studies.md
  - ML Data Foundations:
      - data/index.md
      - Events to Training Examples: data/events-to-examples.md
      - Labels and Ground Truth: data/labels.md
      - Features, Freshness, Leakage: data/features-leakage.md
      - Formats and Storage: data/formats-storage.md
      - Pipelines and Lakehouse: data/pipelines-lakehouse.md
  - Training in Production:
